<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VLC Real Estate Analytics</title>
  <meta name="description" content="Weekly Valencia city-centre real estate market snapshot: rent and sale price trends, neighbourhood comparisons, and rent-vs-sale yield analytics.">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <meta name="theme-color" content="#f8f9fa" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#14181c" media="(prefers-color-scheme: dark)">

  <!-- Open Graph -->
  <meta property="og:title" content="VLC Real Estate Analytics">
  <meta property="og:description" content="Weekly Valencia city-centre real estate market snapshot: rent and sale price trends, neighbourhood comparisons, and rent-vs-sale yield analytics.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="/">
  <meta property="og:image" content="favicon.svg">

  <!-- Twitter card -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="VLC Real Estate Analytics">
  <meta name="twitter:description" content="Weekly Valencia city-centre real estate market snapshot.">

  <link rel="stylesheet" href="styles.css">

  <!-- Plotly.js v2.35.2 — vendored same-origin (no CDN). Review M3. -->
  <script src="vendor/plotly.min.js"></script>

  <!--
    DATA_URL is set per-environment by the deploy workflow.
    For local smoke-test: replace with a path to a local latest.json.
  -->
  <script>
    window.CONFIG = {
      DATA_URL: "/gold/aggregations/latest.json"
    };
  </script>
</head>
<body>
  <header>
    <h1>Valencia Real Estate Analytics</h1>
    <p class="subtitle">Weekly market snapshot · Valencia city centre</p>
  </header>

  <main>
    <!-- Population toggle — hidden until JS confirms 'relevant' data exists -->
    <div id="population-toggle" class="toggle-bar" style="display:none">
      <span class="toggle-label">Population:</span>
      <label><input type="radio" name="population" value="general" checked> All listings</label>
      <label><input type="radio" name="population" value="relevant"> <span id="relevant-label">Filtered apartments</span></label>
    </div>

    <section class="chart-section">
      <div id="price-time-series-rent" class="chart-container"></div>
    </section>

    <section class="chart-section">
      <div id="price-time-series-sale" class="chart-container"></div>
    </section>

    <section class="chart-section">
      <div id="price-time-series-district-rent" class="chart-container"></div>
    </section>

    <section class="chart-section">
      <div id="price-time-series-district-sale" class="chart-container"></div>
    </section>

    <section class="chart-section">
      <div id="rent-vs-sale-ratio" class="chart-container"></div>
    </section>

    <section class="chart-section">
      <div id="rent-vs-sale-ratio-time-series" class="chart-container"></div>
    </section>

    <section class="chart-section">
      <div id="boxplot-by-neighborhood-rent" class="chart-container"></div>
    </section>

    <section class="chart-section">
      <div id="boxplot-by-neighborhood-sale" class="chart-container"></div>
    </section>
  </main>

  <footer>
    <span id="data-updated">Data last updated: —</span>
    <a href="https://github.com/LeopoldWalther/vlc-real-estate-analytics" target="_blank" rel="noopener noreferrer">Source on GitHub</a>
  </footer>

  <script type="module" src="app.js"></script>
</body>
</html>
