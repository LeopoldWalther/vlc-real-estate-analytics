name: workflow-consistency

on:
  pull_request:
    paths:
      - '.github/**'
      - 'dev/**'
  push:
    branches:
      - main
    paths:
      - '.github/**'
      - 'dev/**'

jobs:
  workflow-consistency:
    name: workflow-consistency
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate planning artifacts
        run: python dev/tools/validate_workflow.py
