repos:
  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
        exclude: ^frontend/vendor/
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=500']
        exclude: ^frontend/vendor/
      - id: check-merge-conflict
      - id: detect-private-key

  # Python formatting with Black
  - repo: https://github.com/psf/black
    rev: 24.1.0
    hooks:
      - id: black
        args: [--check]
        files: ^src/etl/

  # Python linting with Ruff
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.1.13
    hooks:
      - id: ruff
        args: [--fix]
        files: ^src/etl/

  # Python type checking with mypy (production code across all of src/etl;
  # tests are excluded because they live in separate test packages per layer)
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.8.0
    hooks:
      - id: mypy
        files: ^src/etl/
        exclude: ^src/etl/(tests|data_collection/tests|data_processing/tests|common/tests|pipeline_health/tests)/
        additional_dependencies:
          - "boto3-stubs[lambda,s3,secretsmanager]"
          - types-requests
          - pandas-stubs

  # Terraform formatting
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.86.0
    hooks:
      - id: terraform_fmt
      - id: terraform_validate
        args:
          - --hook-config=--retry-once-with-cleanup=true

  # Run pytest for Lambda code
  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: bash -c '.venv/bin/pytest src/etl/data_collection/tests/ src/etl/data_processing/tests/ --cov=src/etl/data_collection --cov-report=term-missing --cov-fail-under=80'
        language: system
        pass_filenames: false
        always_run: false

      # Run Vitest for frontend JS changes
      - id: vitest
        name: vitest
        entry: bash -c 'cd frontend && npm test'
        language: system
        files: ^frontend/.*\.js$
        exclude: ^frontend/vendor/
        pass_filenames: false
        always_run: false
