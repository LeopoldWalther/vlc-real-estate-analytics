# Example technical plan — illustrative only.
#
# The `@reviewer` emits one of these per feature at
# dev/plans/technical/FEATURE-XXX-technical-plan.yaml. This sample shows the expected shape; it is
# intentionally generic. `for_feature` here does not match a real FEATURE-NNN, so the consistency
# checker skips it. Copy this structure and adapt the paths to your project when planning a feature.

technical_plan:
  metadata:
    for_feature: "FEATURE-001-example"
    created_by: "reviewer_agent"
    created_at: "2026-01-01"
    version: "1.0"
    total_tasks: 3
    estimated_hours: "3-4"
    risk_level: "LOW"
    critical_path: ["1.1", "1.2", "1.3"]
    reviewed_plan: "dev/reviews/REVIEW-FEATURE-001.md"

  validation:
    auto_validate_on_tag_change: true
    required_checks:
      - "python-lint-and-test"
      - "workflow-consistency"
    min_coverage: 80

  tasks:
    - id: "1.1"
      title: "Define the public interface and error types"
      description: |
        Establish the module's entry point and the exceptions callers can expect, before any
        behaviour exists. Sets the contract the rest of the task builds on.
      status: "not_started"
      complexity: "low"
      estimated_hours: 1
      depends_on: []
      branch: "feature/example-utility/1.1-interface"
      commit_message: "feat(example): add public interface and error types"
      acceptance_criteria:
        - "RED: a test imports the entry point and asserts the error type exists"
        - "GREEN: function signature and custom exception are defined with type hints"
        - "Every public symbol has a Google-style docstring"
      allowed_files:
        - "src/example/__init__.py"
        - "src/example/errors.py"
        - "tests/test_interface.py"
      forbidden_files: []
      can_run_parallel_with: []
      reversible: true
      files_to_create:
        - "src/example/__init__.py"
        - "src/example/errors.py"
        - "tests/test_interface.py"
      files_to_modify: []

    - id: "1.2"
      title: "Implement the core behaviour"
      description: |
        Fill in the logic so the interface from 1.1 does real work, driven by failing tests first.
      status: "not_started"
      complexity: "medium"
      estimated_hours: 1.5
      depends_on: ["1.1"]
      branch: "feature/example-utility/1.2-core"
      commit_message: "feat(example): implement core behaviour"
      acceptance_criteria:
        - "RED: tests cover the happy path plus at least two edge cases"
        - "GREEN: all tests pass with the minimal implementation"
        - "REFACTOR: no function exceeds ~50 lines; names are meaningful"
      allowed_files:
        - "src/example/core.py"
        - "tests/test_core.py"
      forbidden_files:
        - "src/example/errors.py"
      can_run_parallel_with: []
      reversible: true
      files_to_create:
        - "src/example/core.py"
        - "tests/test_core.py"
      files_to_modify:
        - "src/example/__init__.py"

    - id: "1.3"
      title: "Document usage"
      description: |
        Add a short README section with runnable examples once behaviour is stable.
      status: "not_started"
      complexity: "low"
      estimated_hours: 0.5
      depends_on: ["1.2"]
      branch: "feature/example-utility/1.3-docs"
      commit_message: "docs(example): add usage section"
      acceptance_criteria:
        - "README documents the entry point with at least two runnable examples"
        - "Examples execute without error"
      allowed_files:
        - "README.md"
      forbidden_files: []
      can_run_parallel_with: []
      reversible: true
      files_to_create: []
      files_to_modify:
        - "README.md"

  git_workflow:
    commit_strategy: "One focused commit per task"
    commit_message_format: "<type>(<scope>): <description>"
    allowed_commit_types: ["feat", "fix", "test", "docs", "refactor", "chore"]
    final_pr_title: "feat(example): <one-line summary of the task>"
    final_pr_description: |
      Implements FEATURE-001. See dev/reviews/REVIEW-FEATURE-001.md for context.

  notes:
    - "Generic sample for the template — replace paths and scopes with your project's."
    - "Keep metadata.total_tasks equal to the number of entries under tasks."
