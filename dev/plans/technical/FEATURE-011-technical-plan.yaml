      - "infrastructure/**"
      - ".github/workflows/**"
    can_run_parallel_with: []
    reversible: true
    files_to_create:
      - "frontend/tests/app_tab_wiring.test.js"
    files_to_modify:
      - "frontend/app.js"
      - "frontend/index.html"
      - "frontend/styles.css"

  - id: "11.11"
    title: "Frontend documentation and manual accessibility checklist"
    description: >
      Document the tab architecture and Data Basis frontend modules, then perform a manual mobile,
      keyboard, dark/light, and RTL smoke check. Record the checklist in the feature plan progress
      log/status section.
    status: "not_started"
    complexity: "low"
    estimated_hours: 1
    depends_on: ["11.10"]
    branch: "feature/dashboard-tabs-data-basis/11.11-frontend-docs-a11y"
    commit_message: "docs(frontend): document tabbed Data Basis dashboard"
    acceptance_criteria:
      - "documentation/FRONTEND_LAYER.md documents tab_state.js, search_config.js, and new Data Basis chart modules"
      - "Manual checklist covers 390px mobile width, desktop width, keyboard-only tab switching, dark/light mode, and Arabic RTL labels"
      - "No external network calls are introduced by Data Basis map rendering"
      - "dev/plans/FEATURE-011-dashboard-tabs-data-basis.md progress log records the manual checklist result"
    allowed_files:
      - "documentation/FRONTEND_LAYER.md"
      - "dev/plans/FEATURE-011-dashboard-tabs-data-basis.md"
    forbidden_files:
      - "frontend/src/**"
      - "src/**"
      - "infrastructure/**"
      - ".github/workflows/**"
    can_run_parallel_with: []
    reversible: true
    files_to_create: []
    files_to_modify:
      - "documentation/FRONTEND_LAYER.md"
      - "dev/plans/FEATURE-011-dashboard-tabs-data-basis.md"

  - id: "11.12"
    title: "Deploy verification and feature closeout"
    description: >
      Run full backend/frontend validation, deploy the updated gold Lambda to dev first, refresh
      latest.json, visually verify the Data Basis tab in dev, then promote to prod. Sync all workflow
      statuses after verification.
    status: "not_started"
    complexity: "medium"
    estimated_hours: 2
    depends_on: ["11.5", "11.11"]
    branch: "feature/dashboard-tabs-data-basis/11.12-verify-deploy-closeout"
    commit_message: "chore(feature-011): verify and close Data Basis tab"
    acceptance_criteria:
      - "Relevant pytest suites for data_collection and data_processing pass"
      - "npx vitest run passes from frontend/"
      - "python dev/tools/validate_workflow.py exits 0"
      - "Dev latest.json contains data_basis with all expected datasets and privacy-safe location grid"
      - "Dev dashboard renders Trend Analysis and Data Basis tabs without console errors on mobile and desktop"
      - "Prod promotion happens only after dev verification succeeds"
      - "dev/plans/FEATURE-011-dashboard-tabs-data-basis.md, dev/plans/README.md, and this technical plan reflect completion"
    allowed_files:
      - "dev/plans/FEATURE-011-dashboard-tabs-data-basis.md"
      - "dev/plans/README.md"
      - "dev/plans/technical/FEATURE-011-technical-plan.yaml"
    forbidden_files:
      - "frontend/**"
      - "src/**"
      - "infrastructure/**"
      - ".github/workflows/**"
    can_run_parallel_with: []
    reversible: true
    files_to_create: []
    files_to_modify:
      - "dev/plans/FEATURE-011-dashboard-tabs-data-basis.md"
      - "dev/plans/README.md"
      - "dev/plans/technical/FEATURE-011-technical-plan.yaml"

git_workflow:
  branch_root: "feature/dashboard-tabs-data-basis"
  strategy: >
    Use one feature lineage with small task branches off main. Backend/data-contract tasks 11.1-11.5
    should merge first and be verified before app.js depends on data_basis. Frontend tab-shell work
    11.6-11.7 can proceed independently from backend helpers; chart/i18n/app wiring fans in after
    the backend fixture and tab markup exist. Do not implement FEATURE-012 Pipeline Health here.
  pr_per_phase: true

notes:
  - "Review findings folded in: H1 privacy-safe location grid instead of raw coordinates; H2 existing general/relevant blocks remain compatible; M1 map labelled as aggregate coordinate distribution; M2 stable public search_config shape; M3 pure modules keep app.js thin."
  - "No external map tiles, CDN, Mapbox token, or third-party network call is allowed in FEATURE-011."
  - "The Data Basis tab describes the collection area and dataset shape; it is intentionally separate from Trend Analysis filters and KPIs."
  - "If the user later wants a real street map, create a separate plan because it changes the frontend privacy/network contract."
