    description: >
      TDD, RED first. Create frontend/tests/chart_theme.test.js covering
      buildLayout({ viewport, colorScheme, overrides }): viewport='mobile' returns compact margins,
      a horizontal bottom legend, and smaller font sizes; viewport='desktop' returns the current
      wider margins and a vertical legend (matching today's hand-rolled defaults, so migration in
      9.6-9.10 is behaviour-preserving); colorScheme='dark' returns a dark colorway/gridline/font
      color set, colorScheme='light' returns the current light defaults; overrides is deep-merged
      into the computed base layout without dropping unrelated base keys (e.g. passing only
      { xaxis: { title: { text: 'Date' } } } must not remove yaxis/margin/legend from the result);
      the returned object never contains a top-level 'title' key (review L1 — title ownership stays
      with each renderer, stamped by app.js for the population label). Then implement
      frontend/src/chart_theme.js as a factory function (no class needed — a config-producing
      function is sufficient; this is deliberately not over-engineered into a class hierarchy).
    status: "done"
    complexity: "medium"
    estimated_hours: 2
    depends_on: []
    branch: "feature/frontend-redesign/9.5-chart-theme-factory"
    commit_message: "feat(frontend): chart_theme buildLayout factory (viewport x colorScheme)"
    acceptance_criteria:
      - "RED: frontend/tests/chart_theme.test.js is authored and fails before the implementation exists"
      - "GREEN: buildLayout({viewport:'mobile', colorScheme:'light', overrides:{}}) returns compact margins + horizontal bottom legend + smaller fonts"
      - "GREEN: buildLayout({viewport:'desktop', colorScheme:'light', overrides:{}}) matches today's hand-rolled margin/legend defaults (l:80,r:40,t:60,b:60-80 range; vertical legend)"
      - "GREEN: colorScheme:'dark' vs 'light' change the colorway/gridline/font colour fields, all else equal"
      - "GREEN: overrides are deep-merged (nested xaxis/yaxis override keys merge in without deleting sibling base keys)"
      - "GREEN: the returned layout object never has a 'title' key regardless of overrides passed"
      - "coverage on frontend/src/chart_theme.js > 80%"
    allowed_files:
