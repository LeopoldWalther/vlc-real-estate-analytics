  - id: "9.11"
    title: "app.js wiring: dashboard_state, summary KPIs, responsive re-render"
    description: >
      Rewire frontend/app.js as a thin DOM-applying consumer of the new pure modules — no business
      logic lives here. On load: set the loading-lifecycle state (dashboard_state) and reflect it in
      the DOM (show skeletons); call dataSource.load(); on success transition to ready, render KPI
      cards into the 9.2 KPI row via summary.summaryStats(data) + formatKpi, and render every chart
      passing { viewport: resolveViewport(window.innerWidth), colorScheme: resolveTheme(localStorage
      theme, matchMedia('(prefers-color-scheme: dark)').matches) } as context, with
      Plotly.newPlot(container, fig.data, fig.layout, { responsive: true }). On failure transition to
      error and show the retry block; the retry button's click handler re-triggers the loading
      transition and reruns load(). Add a debounced (e.g. 200ms) resize listener and a
      matchMedia('(prefers-color-scheme: dark)') change listener that recompute
      viewport/colorScheme and call shouldRerender(prev, next) before calling Plotly.react on every
      chart with the new context-derived layout — never on every resize tick. Persist an explicit
      theme choice (if a theme toggle exists) to localStorage and apply data-theme on <html>.
    status: "not_started"
    complexity: "high"
    estimated_hours: 2.5
    depends_on: ["9.2", "9.3", "9.4", "9.6", "9.7", "9.8", "9.9", "9.10"]
    branch: "feature/frontend-redesign/9.11-app-wiring"
    commit_message: "feat(frontend): wire dashboard_state + summary KPIs + responsive chart re-render"
    acceptance_criteria:
      - "GIVEN dataSource.load() succeeds THEN the loading skeletons are hidden, the KPI row is populated via summary.js, and all 8 charts render with { responsive: true }"
      - "GIVEN dataSource.load() rejects THEN the error/retry block is shown and clicking #retry-button re-triggers the load-lifecycle from loading"
      - "GIVEN a debounced resize crossing the 768px breakpoint THEN shouldRerender returns true and Plotly.react is called with the new viewport-derived layout on every chart"
      - "GIVEN a resize that does not cross the breakpoint THEN shouldRerender returns false and Plotly.react is NOT called"
      - "GIVEN the OS or an explicit toggle changes color scheme THEN charts re-render with the new colorScheme layout and <html data-theme> reflects the choice"
      - "app.js contains no aggregation math, no theme-resolution branching, and no viewport-breakpoint arithmetic — all delegated to dashboard_state.js/summary.js"
      - "existing population-toggle behaviour (general/relevant switch) is preserved unchanged"
      - "npm test stays green"
    allowed_files:
      - "frontend/app.js"
    forbidden_files:
