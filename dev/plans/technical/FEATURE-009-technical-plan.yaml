metadata:
  for_feature: "FEATURE-009"
  title: "Frontend redesign: mobile-first, professional polish"
  created_by: "@reviewer"
  created_at: "2026-06-17"
  version: "1.0"
  total_tasks: 13
  estimated_hours: 16.5
  risk_level: "medium"
  critical_path: ["9.1", "9.2", "9.5", "9.6", "9.11", "9.12", "9.13"]
  reviewed_plan: "dev/reviews/REVIEW-FEATURE-009.md"

validation:
  required_checks:
    - "node-test"
    - "workflow-consistency"
  min_coverage: ">80% on new frontend/src/*.js modules"

tasks:
  - id: "9.1"
    title: "Design tokens + brand identity + favicon + meta/OG/Twitter tags"
    description: >
      Add the CSS custom-property design-token layer to frontend/styles.css: :root block with
      --color-*, --space-*, --radius-*, --font-* tokens for the light (default) palette, plus a
      dark palette under both [data-theme="dark"] (explicit override) and
      @media (prefers-color-scheme: dark) (system default, only when no explicit override is
      stored — the cascade order must let [data-theme="light"] win over the media query so a user
      who explicitly picks light on a dark-OS still gets light). Restyle the header (accent color),
      cards (subtle shadow, rounded corners), and footer (data-updated timestamp placeholder + link
      to the GitHub repo) using only the new tokens — no hex literals outside :root. Add
      frontend/favicon.svg (simple brand mark, inline <svg>, no external asset). In
      frontend/index.html add: <link rel="icon" href="favicon.svg">, <meta name="description">,
      <meta name="theme-color"> (light + a dark variant via media attr), Open Graph
      (og:title/og:description/og:type/og:image if trivial to inline, og:url can be a relative
      placeholder), and Twitter card tags (twitter:card=summary). Verify lang="en" stays correct.
      No external font or network calls anywhere (system font stack only, already the case).
    status: "done"
    complexity: "medium"
    estimated_hours: 1.5
    depends_on: []
    branch: "feature/frontend-redesign/9.1-design-tokens"
    commit_message: "feat(frontend): design tokens, dark/light palette, favicon, meta/OG tags"
    acceptance_criteria:
      - "GIVEN styles.css WHEN inspected THEN a :root block declares --color-*, --space-*, --radius-*, --font-* tokens and no other rule uses a raw hex/rgb literal"
      - "GIVEN [data-theme=\"dark\"] on <html> WHEN styles.css is parsed THEN a dark-palette override block exists overriding the same token names"
      - "GIVEN no data-theme attribute WHEN the OS prefers dark THEN @media (prefers-color-scheme: dark) applies the same dark tokens"
      - "GIVEN index.html WHEN viewed THEN <link rel=\"icon\">, <meta name=\"description\">, <meta name=\"theme-color\">, og:title/og:description/og:type, and twitter:card tags are present"
      - "GIVEN the network tab WHEN the page loads THEN zero requests leave the same-origin CloudFront distribution (no external fonts/CDNs)"
      - "existing Vitest suite (npm test) stays green — no JS changed in this task"
    allowed_files:
      - "frontend/styles.css"
      - "frontend/index.html"
      - "frontend/favicon.svg"
    forbidden_files:
      - "frontend/app.js"
      - "frontend/src/**"
      - ".github/workflows/**"
      - "infrastructure/**"
    can_run_parallel_with: []
    reversible: true
    files_to_create:
      - "frontend/favicon.svg"
    files_to_modify:
      - "frontend/styles.css"
      - "frontend/index.html"

  - id: "9.2"
    title: "Responsive HTML skeleton: card grid, KPI row, loading skeletons, retry button"
    description: >
      Restructure frontend/index.html and frontend/styles.css for mobile-first responsive layout:
      1-column card grid by default, 2-column CSS grid at >=768px (media query on the existing
      .chart-section wrapper, renamed/kept compatible with app.js's getElementById lookups — do
      not change any #id used by app.js). Add a KPI row container (e.g. <section id="kpi-row"
      class="kpi-row"> with 4-5 empty <div class="kpi-card" data-kpi="..."> placeholders) above the
      charts, populated later by app.js (task 9.11) via summary.js. Add a per-chart loading
      skeleton (a pulsing placeholder element, CSS-only animation respecting
      prefers-reduced-motion) shown by default and a hidden-by-default error/retry block with a
      <button id="retry-button"> per the redesign brief. Ensure all interactive elements
      (retry button, theme toggle placeholder, population toggle labels) have >=44px touch targets
      at mobile widths. No horizontal scroll at 375px/768px/1280px.
    status: "done"
    complexity: "medium"
    estimated_hours: 2
    depends_on: ["9.1"]
    branch: "feature/frontend-redesign/9.2-responsive-skeleton"
    commit_message: "feat(frontend): mobile-first card grid, KPI row, loading/error skeleton markup"
    acceptance_criteria:
      - "GIVEN styles.css WHEN viewport width < 768px THEN chart cards render 1-per-row; WHEN width >= 768px THEN 2-per-row via CSS grid"
      - "GIVEN index.html WHEN inspected THEN a KPI row container with data-kpi placeholders exists above the chart sections"
      - "GIVEN index.html WHEN inspected THEN each chart-section has a loading-skeleton element and a hidden error/retry block with an id=\"retry-button\" (or per-chart retry buttons) button"
      - "GIVEN styles.css WHEN prefers-reduced-motion: reduce THEN the skeleton pulse animation is disabled"
      - "GIVEN any interactive control at mobile width THEN its tappable area is >= 44x44px"
      - "manual check at 375px/768px/1280px shows no horizontal scrollbar"
      - "existing Vitest suite stays green — no JS changed; all #ids app.js currently queries (price-time-series-rent, etc., population-toggle, relevant-label) are preserved"
    allowed_files:
      - "frontend/index.html"
      - "frontend/styles.css"
    forbidden_files:
      - "frontend/app.js"
      - "frontend/src/**"
      - ".github/workflows/**"
      - "infrastructure/**"
    can_run_parallel_with: []
    reversible: true
    files_to_create: []
    files_to_modify:
      - "frontend/index.html"
      - "frontend/styles.css"

  - id: "9.3"
    title: "dashboard_state.js — pure load-lifecycle + theme/viewport helpers (TDD)"
    description: >
      TDD, RED first. Create frontend/tests/dashboard_state.test.js covering: resolveTheme(stored,
      systemPrefers) -> 'light'|'dark' (explicit stored value wins; otherwise follows
      systemPrefers; invalid/absent stored value falls back to systemPrefers); resolveViewport(width)
      -> 'mobile'|'desktop' at the 768px breakpoint (width < 768 -> 'mobile', >= 768 -> 'desktop');
      shouldRerender(prev, next) -> true only when prev.viewport !== next.viewport or
      prev.colorScheme !== next.colorScheme (false on any other change, e.g. identical repeated
      values); and a load-lifecycle helper (e.g. createLoadState()/transition(state, event)) whose
      states are loading -> ready | error, and whose retry event resets any state back to loading.
      Then implement frontend/src/dashboard_state.js to satisfy the tests. Pure functions/factories
      only — no DOM access, no fetch, no globalThis reference anywhere in this module.
    status: "done"
    complexity: "medium"
    estimated_hours: 2
    depends_on: []
    branch: "feature/frontend-redesign/9.3-dashboard-state"
    commit_message: "feat(frontend): dashboard_state pure reducer (theme/viewport/lifecycle)"
    acceptance_criteria:
      - "RED: frontend/tests/dashboard_state.test.js is authored and fails before the implementation exists"
      - "GREEN: resolveTheme(stored, systemPrefers) prefers a valid stored value over systemPrefers, and falls back to systemPrefers when stored is null/invalid"
      - "GREEN: resolveViewport(width) returns 'mobile' below 768 and 'desktop' at/above 768"
      - "GREEN: shouldRerender returns false when viewport and colorScheme are both unchanged, true when either changes"
      - "GREEN: the lifecycle helper transitions loading->ready, loading->error, and (from any state) retry->loading"
      - "grep confirms no 'document', 'window', or 'fetch' identifiers in frontend/src/dashboard_state.js"
      - "coverage on frontend/src/dashboard_state.js > 80%"
    allowed_files:
      - "frontend/src/dashboard_state.js"
      - "frontend/tests/dashboard_state.test.js"
    forbidden_files:
      - "frontend/app.js"
      - "frontend/index.html"
      - "frontend/styles.css"
      - "frontend/src/charts/**"
      - ".github/workflows/**"
    can_run_parallel_with: ["9.4", "9.5"]
    reversible: true
    files_to_create:
      - "frontend/src/dashboard_state.js"
      - "frontend/tests/dashboard_state.test.js"
    files_to_modify: []

  - id: "9.4"
    title: "summary.js — KPI aggregation module (TDD, review H1)"
    description: >
      TDD, RED first. Inspect frontend/tests/fixtures/latest.sample.json's actual shape (already
      done by the reviewer: boxplot_by_neighborhood carries {operation, count, median, ...} per
      neighbourhood; rent_vs_sale_ratio carries {mean_priceByArea_sale, mean_priceByArea_rent,
      mean_sales_price_by_rent_ratio, count_listings_sale, count_listings_rent}). Create
      frontend/tests/summary.test.js covering summaryStats(data): median rent €/m²/mo and median
      sale €/m² computed as a count-weighted aggregate across boxplot_by_neighborhood groups
      (weight = group.count, not a naive mean-of-medians); implied gross yield % derived from
      rent_vs_sale_ratio's mean_sales_price_by_rent_ratio (document the formula in the module
      docstring: annual rent / sale price, i.e. (12 / ratio) * 100); total listing counts (sum of
      count_listings_sale + count_listings_rent across rent_vs_sale_ratio groups); last-updated
      from data.generated_at. Every returned field must be null-able (return null, never throw)
      when population/boxplot/ratio blocks are missing or empty arrays. Also implement
      formatKpi(value, kind) for consistent number/percentage/date formatting (kind:
      'eur_per_m2_month' | 'eur_per_m2' | 'percent' | 'count' | 'date'), returning an em-dash
      placeholder string for null input. Then implement frontend/src/summary.js.
    status: "done"
    complexity: "medium"
    estimated_hours: 2
    depends_on: []
    branch: "feature/frontend-redesign/9.4-summary-kpis"
    commit_message: "feat(frontend): summary.js KPI aggregation (median rent/sale, yield, counts)"
    acceptance_criteria:
      - "RED: frontend/tests/summary.test.js is authored against the real fixture shape and fails before implementation"
      - "GREEN: summaryStats(fixture.general) returns a count-weighted median rent (€/m²/mo) and median sale (€/m²)"
      - "GREEN: summaryStats returns an implied gross yield % derived from mean_sales_price_by_rent_ratio, with the formula documented in the docstring"
      - "GREEN: summaryStats returns total listing counts and lastUpdated from generated_at"
      - "GREEN: summaryStats({}) and summaryStats(null) return an object with every field null, and do not throw"
      - "GREEN: formatKpi(null, any kind) returns a placeholder string ('—') without throwing"
      - "coverage on frontend/src/summary.js > 80%"
    allowed_files:
      - "frontend/src/summary.js"
      - "frontend/tests/summary.test.js"
    forbidden_files:
      - "frontend/app.js"
      - "frontend/index.html"
      - "frontend/styles.css"
      - "frontend/src/charts/**"
      - ".github/workflows/**"
    can_run_parallel_with: ["9.3", "9.5"]
    reversible: true
    files_to_create:
