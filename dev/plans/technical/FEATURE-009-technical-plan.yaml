metadata:
  for_feature: "FEATURE-009"
  title: "Frontend redesign: clean, modern, mobile-first dashboard"
  created_by: "@reviewer"
  created_at: "2026-07-16"
  version: "1.0"
  total_tasks: 13
  estimated_hours: 18
  risk_level: "medium"
  critical_path: ["9.1", "9.2", "9.4", "9.5", "9.6", "9.11", "9.12"]
  reviewed_plan: "dev/reviews/REVIEW-FEATURE-009.md"

validation:
  required_checks:
    - "node-test"
    - "workflow-consistency"
  min_coverage: ">80% on new frontend src modules"

tasks:
  - id: "9.1"
    title: "Design tokens and base visual identity"
    description: >
      Rewrite the CSS foundation with custom properties for color, spacing, radius,
      shadow, typography, and fluid type. Keep the stack zero-build and avoid
      external font/network dependencies.
    status: "not_started"
    complexity: "medium"
    estimated_hours: 1.5
    depends_on: []
    branch: "feature/frontend-redesign/9.1-design-tokens"
    commit_message: "style(frontend): add dashboard design tokens and visual identity"
    acceptance_criteria:
      - "GIVEN the dashboard CSS WHEN loaded THEN colors, spacing, radii, shadows, and type scales come from CSS custom properties"
      - "GIVEN existing frontend tests WHEN npm test runs THEN the suite is green"
      - "GIVEN the page at 360px width WHEN inspected manually THEN no base layout element causes horizontal scroll"
    allowed_files:
      - "frontend/styles.css"
    forbidden_files:
      - "src/**"
      - "infrastructure/**"
      - ".github/workflows/**"
    can_run_parallel_with: []
    reversible: true
    files_to_create: []
    files_to_modify:
      - "frontend/styles.css"

  - id: "9.2"
    title: "Responsive dashboard shell and chart cards"
    description: >
      Replace the plain stacked chart sections with semantic card markup: header,
      KPI placeholder region, population toggle, chart grid, card headings, captions,
      and chart bodies sized for mobile and desktop.
    status: "not_started"
    complexity: "medium"
    estimated_hours: 2
    depends_on: ["9.1"]
    branch: "feature/frontend-redesign/9.2-responsive-shell"
    commit_message: "feat(frontend): add responsive dashboard card shell"
    acceptance_criteria:
      - "GIVEN 360px, 768px, and 1280px widths WHEN viewed manually THEN the dashboard has no horizontal scroll"
      - "GIVEN chart cards WHEN viewed THEN each chart has an HTML heading outside Plotly"
      - "GIVEN existing tests WHEN npm test runs THEN the suite is green"
    allowed_files:
      - "frontend/index.html"
      - "frontend/styles.css"
    forbidden_files:
      - "src/etl/**"
      - "infrastructure/**"
      - ".github/workflows/**"
    can_run_parallel_with: []
    reversible: true
    files_to_create: []
    files_to_modify:
      - "frontend/index.html"
      - "frontend/styles.css"

  - id: "9.3"
