      Add pure helpers for load lifecycle, theme resolution, viewport resolution,
      and rerender decisions. Write failing Vitest coverage first, then implement.
    status: "not_started"
    complexity: "medium"
    estimated_hours: 1.5
    depends_on: []
    branch: "feature/frontend-redesign/9.3-dashboard-state"
    commit_message: "feat(frontend): add testable dashboard state helpers"
    acceptance_criteria:
      - "GIVEN loading, ready, error, and retry actions WHEN reducer tests run THEN expected state transitions pass"
      - "GIVEN stored theme and system preference inputs WHEN resolveTheme runs THEN the selected theme is deterministic"
      - "GIVEN width changes WHEN resolveViewport and shouldRerender run THEN rerender occurs only on viewport-class changes"
    allowed_files:
      - "frontend/src/dashboard_state.js"
      - "frontend/tests/dashboard_state.test.js"
    forbidden_files:
