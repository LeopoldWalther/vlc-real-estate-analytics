git_workflow:
  branch_root: "feature/frontend-redesign"
  strategy: >
    One branch per task off main, small atomic commits, rebase before PR. 9.1 -> 9.2 are sequential
    (foundation). 9.3, 9.4, 9.5 are independent pure modules and can run fully in parallel with each
    other and with 9.1/9.2. 9.6-9.10 (the 5 chart-module migrations) all depend only on 9.5 and can
    run in parallel with each other, one commit per module per the architect's own risk mitigation
    (migrating 5 modules at once risks breaking tests) — the suite must stay green after every
    single one merges. 9.11 fans back in on 9.2, 9.3, 9.4 and all 5 chart migrations. 9.12 depends on
    9.3 (theme resolution) and 9.11 (wiring already in place). 9.13 closes the loop.
  pr_per_phase: true

notes:
  - "Review findings folded in: H1 (9.4 summary.js KPI module — was entirely absent from the architect's plan), H2 (9.5 chart_theme object-param signature with independent colorScheme axis — architect's sketch was viewport-only and positional), M1 (9.3 dedicated dashboard_state.js pure module instead of an ad hoc app.js helper), M2 (9.6-9.10 renderer render(populationBlock, context) signature so viewport/theme reach buildLayout without breaking any existing call site or test)."
  - "Byte-identical data-trace guardrail: 9.6-9.10 must not change formatSeries/formatDistrictSeries/formatRentVsSaleRatio/formatRatioTimeSeries/formatBoxplot outputs — only the layout construction changes."
  - "Do not over-engineer: chart_theme.js and dashboard_state.js stay factory functions / plain objects, not classes — no inheritance hierarchy is introduced anywhere in this feature."
  - "Zero-build constraint: no task introduces a bundler, transpiler, or non-vendored dependency; all new modules are plain ES modules imported the same way data_source.js/transforms.js already are."
  - "No AWS/CI changes: .github/workflows/deploy-frontend.yml and infrastructure/** are forbidden_files on every task — the redesign ships through the existing deploy pipeline unchanged."
