git_workflow:
  branch_root: "feature/frontend-redesign"
  commit_strategy: "one branch and one commit per technical task unless a task requires test-first and implementation commits"
  before_each_task:
    - "git checkout main"
    - "git pull --ff-only"
    - "git checkout -b <task.branch>"
  required_before_merge:
    - "cd frontend && npm test"
    - "python dev/tools/validate_workflow.py"
  deploy_sequence:
    - "Deploy to dev using deploy-frontend.yml workflow_dispatch"
    - "Perform real-device/mobile-width smoke checks in light and dark mode"
    - "Promote to prod using deploy-frontend.yml workflow_dispatch only after dev verification"

notes:
  - "Do not add React, Vue, Svelte, Tailwind, or any build step for this feature."
  - "Do not modify AWS infrastructure or deploy workflows unless a blocker is discovered and reviewed."
  - "Keep app.js orchestration thin; put testable logic in pure src modules."
  - "All Plotly chart titles must live in HTML card headers, not layout.title."
  - "Manual visual checks are required because the current frontend test stack has no browser automation."
