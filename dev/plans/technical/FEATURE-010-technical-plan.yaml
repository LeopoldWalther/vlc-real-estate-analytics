  - id: "10.7"
    title: "Frontend summary fallback prefers rolling field"
    description: >
      Update summaryStats() so the median rent/sale KPI inputs prefer
      boxplot_by_neighborhood_last_3m and fall back to boxplot_by_neighborhood when the new field is
      absent. The all-time boxplot chart must keep consuming boxplot_by_neighborhood via its existing
      renderer path.
    status: "not_started"
    complexity: "medium"
    estimated_hours: 1.5
    depends_on: ["10.5"]
    branch: "feature/rolling-3m-median-kpis/10.7-summary-fallback"
    commit_message: "feat(frontend): use rolling boxplot for median KPIs"
    acceptance_criteria:
      - "RED: summary.test.js includes a case where both fields exist and the rolling field wins over an all-time outlier"
      - "RED/GREEN: summary.test.js includes a case where the rolling field is absent and existing all-time behavior still works"
      - "GREEN: medianRentEurPerM2Month and medianSaleEurPerM2 use the selected KPI boxplot input only"
      - "GREEN: impliedGrossYieldPercent, totalListingCount, and lastUpdated behavior is unchanged"
      - "GREEN: frontend/tests/boxplot_by_neighborhood.test.js passes unchanged, proving the all-time chart remains decoupled"
    allowed_files:
      - "frontend/src/summary.js"
      - "frontend/tests/summary.test.js"
    forbidden_files:
      - "src/etl/**"
      - "infrastructure/**"
      - ".github/workflows/**"
    can_run_parallel_with: []
    reversible: true
    files_to_create: []
    files_to_modify:
