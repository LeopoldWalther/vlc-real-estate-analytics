metadata:
  for_feature: "FEATURE-010"
  title: "Rolling 3-month median for rent/sale KPI tiles"
  created_by: "@reviewer"
  created_at: "2026-07-17"
  version: "1.0"
  total_tasks: 10
  estimated_hours: 12
  risk_level: "medium"
  critical_path: ["10.1", "10.2", "10.3", "10.4", "10.5", "10.7", "10.8", "10.9", "10.10"]
  reviewed_plan: "dev/reviews/REVIEW-FEATURE-010.md"

validation:
  required_checks:
    - "python-test"
    - "node-test"
    - "workflow-consistency"
  min_coverage: ">80% on new or changed backend/frontend code"

tasks:
  - id: "10.1"
    title: "Rolling-window date helper with robust snapshot_date normalization"
    description: >
      TDD, RED first. Add tests for a pure helper in gold_aggregate.py that computes the inclusive
      start of a rolling calendar-month window relative to the maximum snapshot_date in a DataFrame.
      The helper must handle ISO date strings, datetime.date, pandas Timestamp-compatible values,
      empty input, and invalid/null dates deterministically. Use pandas-native pd.DateOffset(months=...)
      and expose ROLLING_KPI_WINDOW_MONTHS = 3 as the single named constant.
    status: "done"
    complexity: "medium"
    estimated_hours: 1.5
    depends_on: []
    branch: "feature/rolling-3m-median-kpis/10.1-window-helper"
    commit_message: "feat(gold): add rolling KPI window helper"
    acceptance_criteria:
      - "RED: tests in src/etl/data_processing/tests/test_gold_aggregate.py fail before the helper exists"
      - "GIVEN snapshot_date values spanning more than 3 calendar months WHEN _rolling_window_start(df, 3) runs THEN it returns max(snapshot_date) - pd.DateOffset(months=3)"
      - "GIVEN only 2 weeks of history WHEN the helper runs THEN downstream filtering with the returned start includes all available rows"
      - "GIVEN an empty DataFrame or no parseable snapshot_date values WHEN the helper runs THEN it returns None and does not throw"
      - "GIVEN ISO string, datetime.date, and pandas Timestamp inputs WHEN the helper runs THEN the same inclusive window start is produced"
      - "ROLLING_KPI_WINDOW_MONTHS is defined once in gold_aggregate.py and no literal 3/90-day rolling window is duplicated in aggregation logic"
    allowed_files:
      - "src/etl/data_processing/gold_aggregate.py"
      - "src/etl/data_processing/tests/test_gold_aggregate.py"
    forbidden_files:
      - "frontend/**"
      - "infrastructure/**"
      - ".github/workflows/**"
    can_run_parallel_with: []
    reversible: true
    files_to_create: []
    files_to_modify:
      - "src/etl/data_processing/gold_aggregate.py"
      - "src/etl/data_processing/tests/test_gold_aggregate.py"

  - id: "10.2"
    title: "Windowed neighborhood boxplot with min_count stability guard"
    description: >
      TDD, RED first. Add _boxplot_by_neighborhood_last_months or similarly named helper that filters
      to snapshot_date >= rolling window start, applies min_count per (operation, district, neighborhood)
      inside the window, and delegates to the shared all-time boxplot calculation so quantile math is not
      duplicated. The existing _boxplot_by_neighborhood default behavior must remain all-time and
      unfiltered by min_count unless explicitly requested by the new helper.
    status: "done"
    complexity: "medium"
    estimated_hours: 2
    depends_on: ["10.1"]
    branch: "feature/rolling-3m-median-kpis/10.2-windowed-boxplot"
    commit_message: "feat(gold): compute 3-month neighborhood boxplot"
    acceptance_criteria:
      - "RED: tests prove an old outlier outside the rolling window does not affect min, max, q1, median, or q3"
      - "GREEN: the windowed helper returns records with the same keys and sorted/grouped shape as boxplot_by_neighborhood"
      - "GREEN: rows exactly on the boundary date are included (snapshot_date >= window_start)"
      - "GREEN: groups with fewer than min_count listings inside the window are excluded"
      - "GREEN: existing tests for _boxplot_by_neighborhood still pass unchanged, proving the all-time field semantics remain intact"
      - "grep/code review confirms quantile/groupby math is shared or delegated, not copy-pasted into two divergent implementations"
    allowed_files:
      - "src/etl/data_processing/gold_aggregate.py"
      - "src/etl/data_processing/tests/test_gold_aggregate.py"
    forbidden_files:
      - "frontend/**"
      - "infrastructure/**"
      - ".github/workflows/**"
    can_run_parallel_with: []
    reversible: true
    files_to_create: []
    files_to_modify:
      - "src/etl/data_processing/gold_aggregate.py"
      - "src/etl/data_processing/tests/test_gold_aggregate.py"

  - id: "10.3"
    title: "Emit additive last_3m boxplot from pure build_population_block"
    description: >
      Extend the pure gold JSON assembly path so both general and relevant population blocks include
      boxplot_by_neighborhood_last_3m next to the existing boxplot_by_neighborhood. Keep the original
      field's meaning and output unchanged. Tests must assert the new sibling field exists in both
      populations and that the old field remains present.
    status: "done"
    complexity: "medium"
    estimated_hours: 1
    depends_on: ["10.2"]
    branch: "feature/rolling-3m-median-kpis/10.3-population-block-field"
    commit_message: "feat(gold): emit rolling median boxplot field"
    acceptance_criteria:
      - "RED: build_population_block/build_aggregation_json tests fail because boxplot_by_neighborhood_last_3m is absent"
      - "GREEN: general.boxplot_by_neighborhood_last_3m and relevant.boxplot_by_neighborhood_last_3m exist"
      - "GREEN: existing boxplot_by_neighborhood arrays still exist and keep the all-time values for the same fixture input"
      - "GREEN: min_count is passed to the new rolling helper consistently with the output's top-level min_count"
    allowed_files:
      - "src/etl/data_processing/gold_aggregate.py"
      - "src/etl/data_processing/tests/test_gold_aggregate.py"
    forbidden_files:
      - "frontend/**"
      - "infrastructure/**"
      - ".github/workflows/**"
    can_run_parallel_with: []
    reversible: true
    files_to_create: []
    files_to_modify:
      - "src/etl/data_processing/gold_aggregate.py"
      - "src/etl/data_processing/tests/test_gold_aggregate.py"

  - id: "10.4"
    title: "Register Strategy-based GoldAggregator dataset"
    description: >
      Add a NeighborhoodBoxplotLast3Months aggregation strategy in gold_aggregator.py that delegates
      to the new pure helper and registers with key boxplot_by_neighborhood_last_3m in both general
      and relevant default population strategy sequences. Keep GoldAggregator orchestration unchanged
      and preserve constructor dependency injection for custom strategy lists.
    status: "done"
    complexity: "medium"
    estimated_hours: 1
    depends_on: ["10.2"]
    branch: "feature/rolling-3m-median-kpis/10.4-aggregator-strategy"
    commit_message: "feat(gold): register rolling boxplot aggregation strategy"
    acceptance_criteria:
      - "RED: test_gold_aggregator.py asserts default_populations() includes key == 'boxplot_by_neighborhood_last_3m' in both populations"
      - "GREEN: NeighborhoodBoxplotLast3Months implements the existing Aggregation Protocol with key and compute"
      - "GREEN: GoldAggregator._run_population requires no if/switch/isinstance branch for the new dataset"
      - "GREEN: tests prove injected custom strategy lists still work without requiring the new strategy"
    allowed_files:
      - "src/etl/data_processing/gold_aggregator.py"
      - "src/etl/data_processing/tests/test_gold_aggregator.py"
    forbidden_files:
      - "frontend/**"
      - "infrastructure/**"
      - ".github/workflows/**"
    can_run_parallel_with: []
    reversible: true
    files_to_create: []
    files_to_modify:
      - "src/etl/data_processing/gold_aggregator.py"
      - "src/etl/data_processing/tests/test_gold_aggregator.py"

  - id: "10.5"
    title: "Golden master and Lambda integration coverage"
    description: >
      Regenerate and review the gold golden-master fixture so latest.json includes the additive
      last_3m field. Extend the moto-backed Lambda integration test to assert both population blocks
      contain boxplot_by_neighborhood_last_3m in the written S3 object. This task closes the backend
      data-contract loop.
    status: "done"
    complexity: "medium"
    estimated_hours: 1.5
    depends_on: ["10.3", "10.4"]
    branch: "feature/rolling-3m-median-kpis/10.5-golden-and-lambda-tests"
    commit_message: "test(gold): update golden fixture for rolling boxplot field"
    acceptance_criteria:
      - "src/etl/data_processing/tests/fixtures/gold_latest_golden.json includes boxplot_by_neighborhood_last_3m in general and relevant blocks"
      - "test_gold_golden_master.py passes byte-for-byte with the regenerated fixture"
      - "test_gold_aggregation_lambda.py asserts the S3 latest.json payload contains the new field in both populations"
      - "pytest for src/etl/data_processing/tests/test_gold_aggregate.py, test_gold_aggregator.py, test_gold_golden_master.py, and test_gold_aggregation_lambda.py passes"
    allowed_files:
      - "src/etl/data_processing/tests/fixtures/gold_latest_golden.json"
      - "src/etl/data_processing/tests/test_gold_golden_master.py"
      - "src/etl/data_processing/tests/test_gold_aggregation_lambda.py"
      - "src/etl/data_processing/tests/test_gold_aggregator.py"
      - "src/etl/data_processing/tests/test_gold_aggregate.py"
    forbidden_files:
      - "frontend/**"
      - "infrastructure/**"
      - ".github/workflows/**"
    can_run_parallel_with: []
    reversible: true
    files_to_create: []
    files_to_modify:
      - "src/etl/data_processing/tests/fixtures/gold_latest_golden.json"
      - "src/etl/data_processing/tests/test_gold_aggregation_lambda.py"

  - id: "10.6"
    title: "Document the additive rolling boxplot contract"
    description: >
      Update DATA_GOLD_LAYER.md to document boxplot_by_neighborhood_last_3m for both population
      blocks, the ROLLING_KPI_WINDOW_MONTHS constant, inclusive boundary semantics, min_count behavior,
      short-history fallback, and the fact that boxplot_by_neighborhood remains all-time.
    status: "done"
    complexity: "low"
    estimated_hours: 1
    depends_on: ["10.3"]
    branch: "feature/rolling-3m-median-kpis/10.6-gold-docs"
    commit_message: "docs(gold): document 3-month rolling KPI boxplot"
    acceptance_criteria:
      - "documentation/DATA_GOLD_LAYER.md lists boxplot_by_neighborhood_last_3m in the population-block schema"
      - "Docs state the window is relative to max(snapshot_date), not wall-clock now"
      - "Docs state the rolling window uses an inclusive lower boundary and applies min_count inside the window"
      - "Docs explicitly distinguish all-time boxplot_by_neighborhood from rolling boxplot_by_neighborhood_last_3m"
      - "Docs mention short history uses available rows after applying the same min_count rule"
    allowed_files:
      - "documentation/DATA_GOLD_LAYER.md"
    forbidden_files:
