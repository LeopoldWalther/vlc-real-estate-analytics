git_workflow:
  branch_root: "feature/rolling-3m-median-kpis"
  strategy: >
    Use two PRs under the same feature root. PR 1 is backend/docs: tasks 10.1 through 10.6,
    followed by 10.9 for dev verification. PR 2 is frontend/closeout: tasks 10.7 and 10.8 after
    the dev gold JSON contains the new field, followed by 10.10 for final frontend verification and
    prod promotion. Keep one branch per task using the branch names above, merge small tested slices,
    and never change infrastructure or CI for this feature unless a deployment blocker is explicitly
    discovered and approved.
  pr_per_phase: true

notes:
  - "Review findings folded in: H1 (summary.js must prefer last_3m but fall back to all-time), H2 (apply min_count to rolling boxplot groups), M1 (KPI labels disclose last-3-month basis), M2 (robust pandas date normalization), M3 (do not duplicate quantile math)."
  - "The existing boxplot_by_neighborhood field remains an all-time dataset for the box-and-whisker chart; do not repurpose it."
  - "The rolling window is relative to max(snapshot_date) in the scoped/deduped data, not wall-clock now."
  - "No new AWS resources are introduced; incremental monthly cloud cost is effectively $0."
  - "If real dev data has no recent rows after min_count filtering, record that finding explicitly before prod promotion rather than weakening the tests silently."
