    description: >
      Update the static KPI label text and i18n translations for English, German, Spanish, Arabic,
      and Turkish so the rent and sale median KPI cards clearly state they are based on the last
      3 months. Do not change all-time boxplot chart titles.
    status: "not_started"
    complexity: "low"
    estimated_hours: 1
    depends_on: ["10.7"]
    branch: "feature/rolling-3m-median-kpis/10.8-kpi-labels"
    commit_message: "feat(frontend): label median KPIs as 3-month values"
    acceptance_criteria:
