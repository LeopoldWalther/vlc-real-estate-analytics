      - "frontend/src/i18n.js updates kpi.medianRent and kpi.medianSale in en, de, es, ar, and tr"
      - "frontend/tests/i18n.test.js passes and asserts no missing translations for the changed keys if such coverage exists"
      - "Chart title translations for boxplot-by-neighborhood remain all-time/distribution wording and are not changed to 3-month"
    allowed_files:
      - "frontend/index.html"
      - "frontend/src/i18n.js"
      - "frontend/tests/i18n.test.js"
    forbidden_files:
