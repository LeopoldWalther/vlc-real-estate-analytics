technical_plan:
  metadata:
    created_by: "reviewer_agent"
    for_feature: "FEATURE-003"
    created_at: "2026-06-04T00:00:00Z"
    version: "1.0"
    reviewed_plan: "dev/reviews/REVIEW-FEATURE-003.md"

  validation:
    auto_validate_on_tag_change: true
    required_checks:
      - "python-lint-and-test"
      - "terraform-validate"
      - "workflow-consistency"
    min_coverage: 80

  tasks:
    - id: "3.1"
      title: "Schema contract, key parsing, and real bronze fixtures"
      description: >-
        Establish the data contract first. Add parse_key_metadata to derive
        (operation, snapshot_date, page) from the bronze object key, commit a
        small curated set of real bronze JSON fixtures, add a failing
        schema-contract test, and an exploratory script that validates real
        local data in data/s3 before any transform/infra is built.
      status: "done"
      complexity: "medium"
      estimated_hours: 3
      depends_on: []
      branch: "feature/silver-cleaning-lambda/3.1-schema-contract-fixtures"
      commit_message: "test(silver): add key parsing, real bronze fixtures, and schema contract"
      acceptance_criteria:
        - "✓ RED: test_parse_key_metadata_extracts_operation_date_page fails before implementation"
        - "✓ RED: test_real_fixture_has_pricebyarea_neighborhood_operation fails before fixtures exist"
        - "✓ GREEN: parse_key_metadata returns (operation, snapshot_date, page) for real key formats"
        - "✓ REFACTOR: helper extracted with type hints and Google-style docstring, suite green"
        - "✓ 3–5 real, curated bronze JSON fixtures committed under tests/fixtures/bronze/"
        - "✓ Schema-contract test asserts elementList present/non-empty and priceByArea, neighborhood, operation per element"
        - "✓ explore_bronze.py loads real data/s3 files and reports null priceByArea and missing neighborhood counts"
        - "✓ Unit coverage for new code >= 80%"
      allowed_files:
        - "src/etl/data_processing/silver_transform.py"
        - "src/etl/data_processing/explore_bronze.py"
        - "src/etl/data_processing/tests/test_silver_transform.py"
        - "src/etl/data_processing/tests/fixtures/bronze/sample_rent_1.json"
        - "src/etl/data_processing/tests/fixtures/bronze/sample_rent_2.json"
        - "src/etl/data_processing/tests/fixtures/bronze/sample_sale_1.json"
        - "src/etl/data_processing/tests/fixtures/bronze/sample_sale_2.json"
        - "src/etl/data_processing/tests/__init__.py"
      forbidden_files:
        - "infrastructure/**"
        - "src/etl/data_collection/**"
      can_run_parallel_with: []
      reversible: true

    - id: "3.2"
      title: "Pure cleaning: clean to silver individual listings"
      description: >-
        Implement the pure, AWS-free cleaning that mirrors notebook section 3.
        Inject snapshot_date from parse_key_metadata, reduce to the relevant
        columns, drop bathrooms<=0, drop sale rows outside 1000<priceByArea<10000,
        and drop rows with null priceByArea or missing neighborhood. Returns one
        cleaned row per listing (NO aggregation, NO district scope filter, NO
        dashboard JSON — those move to the Gold lambda, FEATURE-004).
      status: "done"
      complexity: "medium"
      estimated_hours: 3
      depends_on: ["3.1"]
      branch: "feature/silver-cleaning-lambda/3.2-cleaned-listings"
      commit_message: "feat(silver): add pure cleaning to individual listings with snapshot_date"
      acceptance_criteria:
        - "✓ RED: test_clean_injects_snapshot_date_and_keeps_individual_listings fails first"
        - "✓ RED: test_clean_drops_zero_bathrooms_and_invalid_sale_price fails first"
        - "✓ RED: test_clean_drops_null_pricebyarea_and_missing_neighborhood fails first"
        - "✓ GREEN: clean() returns one cleaned row per listing with snapshot_date column injected"
        - "✓ GREEN: column reduction keeps only the relevant notebook §3 columns"
        - "✓ GREEN: bathrooms<=0 dropped; sale priceByArea outside 1000..10000 dropped; rent kept"
        - "✓ Empty elementList yields empty output without raising"
        - "✓ Multiple pages of one snapshot keep one row per listing (no aggregation)"
        - "✓ No district scope filter and no aggregation/dashboard JSON in this module"
        - "✓ REFACTOR: helpers split, full type hints + docstrings, suite green"
        - "✓ Unit coverage for transform module >= 80%"
      allowed_files:
        - "src/etl/data_processing/silver_transform.py"
        - "src/etl/data_processing/tests/test_silver_transform.py"
      forbidden_files:
        - "infrastructure/**"
        - "src/etl/data_processing/silver_cleaning_lambda.py"
      can_run_parallel_with: []
      reversible: true

    - id: "3.3"
      title: "Lambda handler: combine snapshot pages, write cleaned-listings Parquet"
      description: >-
        Implement the AWS-edge handler triggered by schedule. List the latest
        snapshot's paginated JSON objects under bronze/idealista, combine pages,
        call the pure clean(), and write Parquet of cleaned individual listings
        partitioned by operation/snapshot_date. JSON only, idempotent on full
        snapshot_date. No aggregation and no latest.json here (Gold/FEATURE-004).
      status: "done"
      complexity: "medium"
      estimated_hours: 3
      depends_on: ["3.2"]
      branch: "feature/silver-cleaning-lambda/3.3-lambda-handler"
      commit_message: "feat(silver): add scheduled lambda handler writing partitioned parquet"
      acceptance_criteria:
        - "✓ RED: test_lambda_combines_pages_writes_partitioned_parquet fails first (moto)"
        - "✓ GREEN: handler combines all snapshot pages and writes one Parquet under operation=.../snapshot_date=YYYY-MM-DD/part.parquet"
        - "✓ GREEN: Parquet contains cleaned individual listings (not aggregated)"
        - "✓ Re-running the same snapshot is idempotent (same key, deterministic output)"
        - "✓ Only JSON is read (no CSV path)"
        - "✓ No aggregation and no latest.json written by this handler"
        - "✓ REFACTOR: AWS edges isolated from pure logic, type hints + docstrings, suite green"
        - "✓ Handler uses AWS-managed pandas layer assumption (no custom pyarrow build)"
        - "✓ Unit/integration coverage for handler >= 80%"
      allowed_files:
        - "src/etl/data_processing/silver_cleaning_lambda.py"
        - "src/etl/data_processing/requirements.txt"
        - "src/etl/data_processing/tests/test_silver_cleaning_lambda.py"
        - "src/etl/requirements-dev.txt"
      forbidden_files:
        - "infrastructure/**"
        - "src/etl/data_collection/**"
      can_run_parallel_with: []
      reversible: true

    - id: "3.4"
      title: "Terraform: scheduled silver lambda module"
      description: >-
        Add a Terraform module for the silver Lambda triggered by a scheduled
        EventBridge rule (not per-object S3 notification). Scope IAM to read
        bronze/idealista and write silver only, add a CloudWatch log group and
        SNS error alarm, and expose the managed-layer ARN as a region-aware
        variable.
      status: "done"
      complexity: "medium"
      estimated_hours: 3
      depends_on: ["3.3"]
      branch: "feature/silver-cleaning-lambda/3.4-terraform-module"
      commit_message: "feat(terraform): add scheduled silver cleaning lambda module"
      acceptance_criteria:
        - "✓ Module files created under infrastructure/modules/lambda_silver/"
        - "✓ Trigger is an EventBridge schedule cron(30 12 ? * SUN *), not an S3 object notification"
        - "✓ Lambda runtime is python3.12 with 512 MB memory"
        - "✓ IAM allows read on bronze/idealista/* and write on silver/* only (prefix-scoped)"
        - "✓ Managed pandas layer ARN is a region-aware variable, not hardcoded"
        - "✓ CloudWatch log group and SNS error alarm wired to existing topic"
        - "✓ terraform fmt -check and terraform validate pass"
      allowed_files:
        - "infrastructure/modules/lambda_silver/main.tf"
        - "infrastructure/modules/lambda_silver/variables.tf"
        - "infrastructure/modules/lambda_silver/outputs.tf"
      forbidden_files:
        - "infrastructure/modules/lambda/**"
        - "infrastructure/environments/prod/**"
        - "src/**"
      can_run_parallel_with: []
      reversible: true

    - id: "3.5"
      title: "Wire dev + docs, optional gated real-bucket smoke test"
      description: >-
        Instantiate the silver module in the dev environment root, validate,
        add the silver layer documentation, and add an optional gated
        real-bucket smoke test (RUN_S3_IT) reading 1–2 real objects from the dev
        bucket. Prod wiring is deferred until after a dev soak.
      status: "done"
      complexity: "low"
      estimated_hours: 2
      depends_on: ["3.4"]
      branch: "feature/silver-cleaning-lambda/3.5-dev-wire-docs-smoke"
      commit_message: "feat(terraform): wire silver lambda in dev with docs and gated smoke test"
      acceptance_criteria:
        - "✓ Dev environment root includes the lambda_silver module block"
        - "✓ terraform validate passes in dev environment"
        - "✓ documentation/DATA_PROCESSING_LAYER.md describes the silver layer architecture"
        - "✓ Optional RUN_S3_IT smoke test reads 1–2 real objects from the dev bucket and is skipped by default"
        - "✓ Prod wiring intentionally deferred until after dev soak"
        - "✓ workflow-consistency validator passes"
      allowed_files:
        - "infrastructure/environments/dev/main.tf"
        - "documentation/DATA_PROCESSING_LAYER.md"
        - "src/etl/data_processing/tests/test_silver_cleaning_lambda.py"
      forbidden_files:
        - "infrastructure/environments/prod/**"
      can_run_parallel_with: []
      reversible: true

    - id: "3.6"
      title: "Incremental guard: skip already-processed snapshots"
      description: >
        Make the Lambda incremental by default. Before writing Parquet, check
        with s3.head_object whether the output key already exists; if so, log
        and skip (no re-processing on weekly re-runs).
        Also add support for event["snapshot_date"] override (ISO string
        YYYY-MM-DD): if present, process only that specific date; if absent,
        fall back to latest-snapshot behaviour.
        IMPORTANT: _list_snapshot_keys currently hard-filters to the latest
        snapshot_date per operation. It must be extended with an optional
        target_date parameter: when set, return all keys for that date instead
        of filtering to the latest. This is the prerequisite for the override
        to work correctly on historical snapshots.
        The existing test_handler_is_idempotent asserts len(df)==1 after two
        runs and will still pass with skip semantics, but its intent changes.
        Replace it with two focused tests: test_second_run_skips_parquet_write
        (assert put_object not called on second run via mock) and
        test_handler_overwrites_when_forced (event={'force': true} bypasses guard).
      status: "done"
      complexity: "low"
      estimated_hours: 2
      depends_on: ["3.3"]
      branch: "feature/silver-cleaning-lambda/3.6-incremental-guard"
      commit_message: "feat(silver): add incremental guard and snapshot_date event override"
      acceptance_criteria:
        - "RED: test_lambda_skips_existing_parquet fails first"
        - "RED: test_lambda_processes_specific_snapshot_date fails first (handler ignores event['snapshot_date'] before this task)"
        - "GREEN: _list_snapshot_keys accepts optional target_date; when set returns keys for that date, otherwise returns latest"
        - "GREEN: handler skips write when s3.head_object returns the key (no ClientError)"
        - "GREEN: handler processes event['snapshot_date'] if present; falls back to latest-snapshot otherwise"
        - "GREEN: test_second_run_skips_parquet_write — assert put_object NOT called on second invocation (mock/spy)"
        - "REFACTOR: lambda_handler docstring updated: event parameter documents snapshot_date override"
        - "REFACTOR: type hints + docstrings, suite green"
        - "Coverage >= 80% for modified handler"
      allowed_files:
        - "src/etl/data_processing/silver_cleaning_lambda.py"
        - "src/etl/data_processing/tests/test_silver_cleaning_lambda.py"
      forbidden_files:
        - "infrastructure/**"
      can_run_parallel_with: []
      reversible: true

    - id: "3.7"
      title: "Backfill script: fan-out one Lambda invocation per snapshot_date"
      description: >
        Create backfill_silver.py that lists all distinct snapshot_dates in
        bronze/idealista/ via S3 ListObjectsV2, then invokes the silver Lambda
        once per date asynchronously (InvocationType='Event') with payload
        {"snapshot_date": "YYYY-MM-DD"}. Already-processed dates are silently
        skipped by the Lambda's own incremental guard (task 3.6). Run once
        manually from local CLI with AWS credentials to backfill all historical
        snapshots.
        The Lambda function name must be configurable: accept it via
        --function-name CLI argument (argparse) or SILVER_LAMBDA_FUNCTION_NAME
        env variable; fail clearly if neither is provided.
        Concurrency note: with ~110 historical snapshots, 110 async invocations
        are fired. Lambda default account concurrency is 1000 but reserved
        concurrency per function may be lower. Add an optional --delay-ms
        argument (default 100 ms) between invocations to avoid throttling.
      status: "planned"
      complexity: "low"
      estimated_hours: 2
      depends_on: ["3.6"]
      branch: "feature/silver-cleaning-lambda/3.7-backfill-script"
      commit_message: "feat(silver): add backfill script fanning out lambda per snapshot_date"
      acceptance_criteria:
        - "RED: test_backfill_discovers_all_snapshot_dates_and_invokes_lambda fails first (moto)"
        - "GREEN: script discovers all unique snapshot_dates from bronze and invokes Lambda once per date"
        - "GREEN: Lambda function name read from --function-name arg or SILVER_LAMBDA_FUNCTION_NAME env; raises SystemExit if neither set"
        - "GREEN: --delay-ms argument controls sleep between invocations (default 100); settable to 0 in tests"
        - "GREEN: already-processed dates are skipped by the Lambda, not the script"
        - "REFACTOR: type hints + docstrings, suite green"
      allowed_files:
        - "src/etl/data_processing/backfill_silver.py"
        - "src/etl/data_processing/tests/test_backfill_silver.py"
      forbidden_files:
        - "infrastructure/**"
      can_run_parallel_with: []
      reversible: true

  summary:
    total_tasks: 7
    estimated_total_hours: 18
    critical_path: ["3.1", "3.2", "3.3", "3.4", "3.5", "3.6", "3.7"]
    parallelizable_tasks: 0
