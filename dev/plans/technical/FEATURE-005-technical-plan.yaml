        - "CloudFront origin 1 = assets bucket (OAC); origin 2 = listings gold/ prefix (OAC)"
        - "Cache policy: long TTL assets, 1h TTL for /gold/aggregations/*"
        - "terraform validate + fmt clean; outputs exposed"
      allowed_files:
