technical_plan:
  metadata:
    for_feature: "FEATURE-005"
    created_by: "reviewer_agent"
    created_at: "2026-06-09T00:00:00Z"
    version: "1.0"
    total_tasks: 9
    estimated_hours: 22
    risk_level: "low"
    critical_path: ["5.1", "5.2", "5.3", "5.5", "5.6", "5.4", "5.7", "5.8"]
    reviewed_plan: "dev/reviews/REVIEW-FEATURE-005.md"
    note: >-
      Retroactive technical plan. Tasks 5.1–5.7 shipped; 5.8 outstanding plus the
      M1 cleanup task (5.9) raised in the review. Authoritative for task status.

  validation:
    required_checks:
      - "node-test"
      - "terraform-validate"
      - "workflow-consistency"
    min_coverage: 80

  # ---------------------------------------------------------------------------
  # Architecture: plain HTML + ESM modules + vendored Plotly.js v2.35.2, served
  # from a private S3 bucket via CloudFront (dual origin: assets long TTL, gold
  # 1h TTL, both OAC). Custom domain via ACM (us-east-1) + Route 53. Data source
  # is gold/aggregations/latest.json (schema v1.0, frozen by FEATURE-004).
  # ---------------------------------------------------------------------------
  architecture:
    frontend_entry: "frontend/index.html"
    js_entry: "frontend/app.js"
    data_url_pattern: "/gold/aggregations/latest.json"   # same-origin via CloudFront
    plotly_version: "2.35.2"
    plotly_delivery: "vendored same-origin (frontend/vendor/plotly.min.js)"
    test_framework: "Vitest 1.6.1"
    chart_renderer_contract: "{ id, title, render(populationBlock) -> { data, layout } }"
    chart_renderer_pattern: "Strategy + Open/Closed — new chart = new module, no app.js edit"
    data_source_pattern: "Adapter + Dependency Inversion; FakeDataSource in tests; schema_version guard throws on mismatch"

  decisions:
    - "SEPARATE rent/sale charts via factory renderer — 200x scale difference makes shared Y-axis unreadable"
    - "GENERAL_ONLY_RENDERERS vs TOGGLE_RENDERERS — relevant block has no price time-series (too sparse); explicit split avoids silent empty charts"
    - "BOXPLOT split rent/sale via makeBoxplotRenderer — same 200x scale issue; dedicated Y-axis labels"
    - "automargin:true + explicit margin on all layouts; overflow:hidden on .chart-container — no clipping/overflow"
    - "Plotly.react for toggle re-renders (diff) vs newPlot (full teardown)"
    - "buildRelevantLabel(filter) derives toggle label from gold relevant_filter — never hardcoded"
    - "toggle change handler MUST be async (await Plotly.react in a sync callback is a SyntaxError that blanks ALL charts)"
    - "CloudFront dual origin: assets (long TTL) + gold prefix (1h TTL), same-origin, no CORS"
    - "OAC not OAI; S3 Block Public Access on"
    - "ACM cert in us-east-1 via aws.us_east_1 provider alias (CloudFront requirement)"
    - "dev domain vlc-report-dev.leopoldwalther.com — wildcard *.leopoldwalther.com covers only ONE subdomain level"
    - "window.CONFIG.DATA_URL injected per env; deploy workflow can override without source edit"
    - "Vitest + FakeDataSource — no DOM/network/Plotly mock; suite runs <250ms"
    - "aws s3 sync excludes tests/, node_modules/, coverage/, *.test.js — no test files in CDN"
    - "Gold MUST be re-run AFTER silver backfill fully completes — verify parquet count before invoking"

  tasks:
    - id: "5.1"
      title: "Frontend skeleton + DataSource + transforms + first chart (MVP)"
      description: >-
        Scaffold frontend/. index.html (title + one chart container +
        window.CONFIG.DATA_URL), styles.css, app.js ESM entry. DataSource adapter
        over fetch() with schema_version guard + FakeDataSource for tests. Pure
        formatSeries in transforms.js. First ChartRenderer in
        src/charts/price_time_series.js. Vitest suite + package.json (Vitest dev dep only).
      status: "done"
      complexity: "medium"
      estimated_hours: 4
      depends_on: []
      branch: "feature/static-visualization-webapp/5.1-frontend-skeleton"
      commit_message: "feat(frontend): skeleton, DataSource, transforms, first chart renderer"
      acceptance_criteria:
        - "DataSource.load() fetches + validates schema_version; FakeDataSource returns fixture without network"
        - "formatSeries returns one trace per (operation, neighbourhood); [] for empty/missing input"
        - "priceTimeSeriesRenderer.render(block) returns { data, layout }"
        - "Vitest tests pass; coverage >= 80% on new JS"
      allowed_files:
        - "frontend/**"
      forbidden_files:
        - "infrastructure/**"
        - "src/etl/**"
      can_run_parallel_with: []
      reversible: true
      files_to_create:
        - "frontend/index.html"
        - "frontend/styles.css"
        - "frontend/app.js"
        - "frontend/src/data_source.js"
        - "frontend/src/transforms.js"
        - "frontend/src/charts/price_time_series.js"
        - "frontend/tests/transforms.test.js"
        - "frontend/tests/price_time_series.test.js"
        - "frontend/tests/data_source.test.js"
        - "frontend/tests/fixtures/latest.sample.json"
        - "frontend/package.json"
      files_to_modify: []

    - id: "5.2"
      title: "Terraform module frontend/: private S3 + CloudFront dual origin + OAC"
      description: >-
        infrastructure/modules/frontend/ — private S3 asset bucket (Block Public
        Access on), CloudFront with two origins via OAC: frontend assets and the
        listings bucket gold/aggregations/ prefix. Long TTL for assets, 1h TTL for
        gold JSON. Outputs: distribution_id, distribution_domain, asset_bucket_name.
      status: "done"
      complexity: "medium"
      estimated_hours: 4
      depends_on: ["5.1"]
      branch: "feature/static-visualization-webapp/5.2-infra-module"
      commit_message: "feat(terraform): frontend module with s3 + cloudfront dual origin + oac"
      acceptance_criteria:
